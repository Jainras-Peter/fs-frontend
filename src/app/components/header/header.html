<header class="top-nav">
  <div class="nav-inner">
    <div class="brand">
      <img src="/logo2.png" alt="FreightDocs" />
      <span>FreightDocs</span>
    </div>
    <nav class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
      <a routerLink="/booking" routerLinkActive="active">Booking</a>
      <a routerLink="/generate" routerLinkActive="active">Generate</a>
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
    </nav>
    <div class="nav-actions">
      <ng-container *ngIf="userService.isLoggedIn$ | async; else loggedOut">
        <a class="nav-login" routerLink="/profile">Profile</a>
        <button pButton label="Log out" class="p-button-outlined p-button-secondary" (click)="onLogout()"></button>
      </ng-container>
      <ng-template #loggedOut>
        <a class="nav-login" routerLink="/login">Log in</a>
        <button pButton label="Sign up" class="nav-signup" routerLink="/signup"></button>
      </ng-template>
    </div>
  </div>
</header>
