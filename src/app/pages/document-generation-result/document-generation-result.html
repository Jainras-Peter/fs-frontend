<div class="h-screen w-full bg-[url('/background.png')] bg-center bg-cover bg-no-repeat flex flex-col items-center justify-center p-4">
  
  <div class="flex flex-col items-center max-w-2xl w-full animate-in fade-in slide-in-from-bottom-4 duration-500">
    <!-- Success / error hero -->
    <div
      class="flex h-24 w-24 items-center justify-center rounded-full bg-emerald-100 shadow-inner mb-6"
      *ngIf="isSuccess"
    >
      <span class="flex h-16 w-16 items-center justify-center rounded-full bg-emerald-500 shadow-md text-white">
        <lucide-icon [img]="Check" class="h-8 w-8 text-white"></lucide-icon>
      </span>
    </div>

    <div
      class="flex h-24 w-24 items-center justify-center rounded-full bg-amber-100 shadow-inner mb-6"
      *ngIf="!isSuccess"
    >
      <span class="flex h-16 w-16 items-center justify-center rounded-full bg-amber-500 shadow-md text-white">
        <lucide-icon [img]="AlertTriangle" class="h-8 w-8 text-white"></lucide-icon>
      </span>
    </div>

    <h1 class="text-3xl font-bold tracking-tight text-slate-900 sm:text-4xl mb-8">
      {{ statusHeading }}
    </h1>

    <p *ngIf="!isSuccess" class="text-base text-slate-600 text-center mb-8">
      {{ statusDescription }}
    </p>

    <!-- Document List Box -->
    <div *ngIf="isSuccess && hasDownloads" class="w-full bg-white/80 backdrop-blur-md border border-slate-200 rounded-xl overflow-hidden shadow-sm mb-6">
      <ul class="divide-y divide-slate-200">
        <li *ngFor="let file of uploadedFiles" class="flex items-center justify-between px-6 py-4 hover:bg-slate-50 transition-colors">
          <span class="font-semibold text-slate-700 text-sm truncate pr-4">{{ file.filename }}</span>
          <a [href]="file.url" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:text-blue-800 transition-colors">
            <lucide-icon [img]="Download" class="h-5 w-5"></lucide-icon>
          </a>
        </li>
      </ul>
    </div>

    <!-- Buttons -->
    <div *ngIf="isSuccess" class="w-full flex flex-col gap-4">
      <button
        *ngIf="hasDownloads"
        type="button"
        [disabled]="archiveLoading"
        (click)="downloadArchive()"
        class="w-full flex items-center justify-center gap-2 rounded-xl bg-blue-700 px-6 py-4 text-base font-semibold text-white shadow-lg shadow-blue-700/20 transition hover:bg-blue-800 disabled:opacity-50"
      >
        <lucide-icon [img]="Download" class="h-5 w-5"></lucide-icon>
        <span *ngIf="!archiveLoading">Download All</span>
        <span *ngIf="archiveLoading">Preparing archive...</span>
      </button>

      <a
        routerLink="/dashboard"
        class="text-sm font-semibold text-blue-700 hover:underline text-left mt-2"
      >
        Go to Dashboard
      </a>
    </div>

    <div *ngIf="!isSuccess" class="w-full flex flex-col gap-4">
      <a
        routerLink="/dashboard"
        class="w-full flex items-center justify-center rounded-xl bg-slate-900 px-6 py-4 text-base font-semibold text-white hover:bg-slate-800"
      >
        Back to Dashboard
      </a>
    </div>
  </div>
</div>
