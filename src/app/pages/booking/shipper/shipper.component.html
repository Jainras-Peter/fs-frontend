<div class="flex h-full min-h-0 flex-col p-8">
    <p-toast position="top-right"></p-toast>

    <!-- Header -->
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-800 tracking-tight">Shipper Management</h1>
        <p class="text-gray-500 mt-1">Manage and add shippers for your logistics operations.</p>
    </div>

    <!-- Toolbar -->
    <div class="flex justify-end mb-6">
        <p-button label="Add Shipper" icon="pi pi-plus" (click)="openAddPopup()"></p-button>
    </div>

    <!-- Table -->
    <div class="flex min-h-0 flex-1 flex-col overflow-hidden rounded-lg border border-gray-100 bg-white shadow-sm">
        <p-table 
            [value]="shippers" 
            [tableStyle]="{ 'min-width': '50rem' }"
            styleClass="p-datatable-sm"
            [rowHover]="true"
            [paginator]="true"
            [rows]="10"
            [scrollable]="true"
            scrollHeight="flex">
            <ng-template pTemplate="header">
                <tr>
                    <th class="w-16">No</th>
                    <th>Shipper ID</th>
                    <th>Shipper Name</th>
                    <th>Contact</th>
                    <th>Address</th>
                    <th class="w-24 text-center">Action</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-shipper let-ri="rowIndex">
                <tr>
                    <td class="text-gray-500 font-medium">{{ri + 1}}</td>
                    <td class="font-semibold text-gray-800">{{shipper.shipper_id}}</td>
                    <td>{{shipper.shipper_name}}</td>
                    <td>{{shipper.shipper_contact}}</td>
                    <td class="truncate max-w-xs" [title]="shipper.shipper_address">{{shipper.shipper_address}}</td>
                    <td>
                        <div class="flex justify-center gap-2">
                            <p-button 
                                icon="pi pi-pencil" 
                                [rounded]="true" 
                                [text]="true" 
                                severity="info"
                                (click)="openEditPopup(shipper)"
                                pTooltip="Edit Shipper">
                            </p-button>
                            <p-button 
                                icon="pi pi-trash" 
                                [rounded]="true" 
                                [text]="true" 
                                severity="danger"
                                (click)="deleteShipper(shipper)"
                                pTooltip="Delete Shipper">
                            </p-button>
                        </div>
                    </td>
                </tr>
            </ng-template>
            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="6" class="text-center p-8 text-gray-500">
                        No shippers found. Click "Add Shipper" to create one.
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>

<app-booking-popup
    *ngIf="displayPopup"
    [(visible)]="displayPopup"
    [shipper]="currentShipper"
    [mode]="popupMode"
    (onSave)="handleSave($event)">
</app-booking-popup>
