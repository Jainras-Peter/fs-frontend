<div class="select-none flex flex-col gap-2 md:min-w-3xl lg:min-w-4xl py-4 animate-in fade-in slide-in-from-right-8 duration-500">
    <div class="flex items-center mb-4">
        <button (click)="back.emit()" class="p-2 text-slate-400 hover:text-slate-600 transition-colors mr-2">
            <lucide-icon [img]="ArrowLeft" class="h-5 w-5"></lucide-icon>
        </button>
        <div>
            <h1 class="text-2xl font-bold text-slate-900">Document Details</h1>
            <p class="text-slate-500 text-sm">Provide specific identifiers for the new document.</p>
        </div>
    </div>

    <div class="flex flex-col gap-4 w-full">
        <div class="flex flex-col gap-2">
          <!--Master Bill of Lading Number Input-->
            <label class="text-sm font-bold text-slate-700">Master BL Number</label>
            <div class="relative">
                <lucide-icon [img]="FileText"
                    class="absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-slate-400"></lucide-icon>
                <input type="text" placeholder="e.g., MBL-LA-2024-9981"
                    class="w-full bg-slate-50 border border-slate-300 rounded-lg py-2.5 pl-12 pr-4 text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none"
                    [(ngModel)]="mblNumber" />
            </div>


        </div>

        <div class="flex flex-col gap-4 bg-[#F3F4F6]/25 backdrop-blur-xs border-slate-300 border-solid border rounded-2xl p-8">
            <label class="text-sm font-bold text-slate-700">Select Shipment(s)</label>
            <div class="space-y-2 w-full max-h-150 overflow-y-auto">
                <div *ngIf="!hasShipments" class="p-4 text-center text-red-500 font-medium bg-red-50 rounded-md">
                    No shipper linked with this MBL
                </div>
<!--                &lt;!&ndash; Only show map if shippers exist &ndash;&gt;-->
<!--                <ng-container *ngIf="hasShipments">-->
<!--                    <label *ngFor="let shipment of shipments; let i = index"-->
<!--                        class="flex items-center p-2 rounded hover:bg-white cursor-pointer group transition-colors">-->
<!--                        <input type="checkbox" name="shipper_choice"-->
<!--                               [checked]="selectedShipments[i].shipment_id.includes(shipment.shipment_id)"-->
<!--                            (change)="toggleShipment(shipment, $any($event.target).checked)"-->
<!--                            class="w-4 h-4 text-blue-700 border-slate-300 rounded focus:ring-blue-500" />-->
<!--                        <span class="ml-3 text-sm text-slate-600 group-hover:text-slate-900">-->
<!--                          {{ shipment.shipment_id }}-->
<!--                        </span>-->
<!--                    </label>-->
<!--                </ng-container>-->

              @if(hasShipments) {
                <app-shipment-details 
                    [mblNumber]="mblNumber" 
                    [shipments]="shipments"
                    [selectedShipments]="selectedShipments"
                    (toggle)="toggleShipment($event.shipment, $event.isChecked)">
                </app-shipment-details>
              }
            </div>
        </div>
    </div>

    <div class="flex justify-center mt-4">
        <button
            class="w-full md:w-64 bg-blue-700 text-white rounded-lg py-3 px-4 font-semibold hover:bg-blue-800 transition-colors flex items-center justify-center shadow-lg shadow-blue-700/20 disabled:opacity-50 disabled:cursor-not-allowed"
            (click)="generatePreview()" [disabled]="isGenerating || !hasShipments">
            <span *ngIf="!isGenerating">Generate Preview</span>
            <span *ngIf="isGenerating">Generating...</span>
            <lucide-icon *ngIf="!isGenerating" [img]="ArrowRight" class="h-5 w-5 ml-2"></lucide-icon>
        </button>
    </div>
</div>
