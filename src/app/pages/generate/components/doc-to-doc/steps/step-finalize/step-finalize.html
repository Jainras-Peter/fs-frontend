<div class="space-y-8 animate-in fade-in slide-in-from-right-8 duration-300">
    <div class="flex items-center justify-between">
        <div class="flex items-center">
            <button (click)="back.emit()" class="p-2 text-slate-400 hover:text-slate-600 transition-colors mr-2">
                <lucide-icon [img]="ArrowLeft" class="h-5 w-5"></lucide-icon>
            </button>
            <div>
                <h1 class="text-2xl font-bold text-slate-900">Step 3: Review & Finalize</h1>
                <p class="text-slate-500 text-sm">Check document data before final submission.</p>
            </div>
        </div>
    </div>

    <div class="grid lg:grid-cols-12 gap-8">
        <div class="lg:col-span-12">
            <div class="flex items-start justify-center gap-6">
                <!-- Prev Button -->
                <button (click)="prev()" [disabled]="currentIndex === 0"
                    class="mt-32 p-2 rounded-full bg-white border border-slate-200 shadow-sm text-slate-600 hover:text-blue-600 hover:border-blue-200 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                    <lucide-icon [img]="ChevronLeft" class="h-6 w-6"></lucide-icon>
                </button>

                <div class="flex-1 max-w-4xl">
                    <app-hbl-preview-full [data]="previewData[currentIndex]"
                        [isEditing]="isEditing"></app-hbl-preview-full>

                    <div class="mt-4 text-center text-sm font-medium text-slate-500">
                        Document {{ currentIndex + 1 }} of {{ previewData.length }}
                    </div>
                </div>

                <!-- Next Button -->
                <button (click)="next()" [disabled]="currentIndex === previewData.length - 1"
                    class="mt-32 p-2 rounded-full bg-white border border-slate-200 shadow-sm text-slate-600 hover:text-blue-600 hover:border-blue-200 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
                    <lucide-icon [img]="ChevronRight" class="h-6 w-6"></lucide-icon>
                </button>
            </div>

            <div class="flex space-x-4 mt-8 max-w-3xl mx-auto" *ngIf="!isEditing">
                <button (click)="back.emit()"
                    class="flex-1 bg-white border border-slate-300 text-slate-700 py-3 rounded-lg font-semibold hover:bg-slate-50 flex items-center justify-center transition-colors">
                    <lucide-icon [img]="ArrowLeft" class="h-4 w-4 mr-2"></lucide-icon>
                    Back to List
                </button>
                <button (click)="toggleEdit()"
                    class="flex-1 bg-white border border-blue-200 text-blue-700 py-3 rounded-lg font-semibold hover:bg-blue-50 flex items-center justify-center transition-colors">
                    <lucide-icon [img]="Edit3" class="h-4 w-4 mr-2"></lucide-icon>
                    Edit Document
                </button>
                <button (click)="handleConfirm()"
                    class="flex-1 bg-blue-700 text-white py-3 rounded-lg font-semibold hover:bg-blue-800 flex items-center justify-center transition-colors shadow-lg shadow-blue-700/20 disabled:opacity-50"
                    [disabled]="isLoading">
                    <span *ngIf="!isLoading">Confirm & Generate</span>
                    <span *ngIf="isLoading">Generating...</span>
                </button>
            </div>

            <!-- Edit Mode Buttons -->
            <div class="flex space-x-4 mt-8 max-w-xl mx-auto" *ngIf="isEditing">
                <button (click)="cancelEdit()"
                    class="flex-1 bg-red-50 border border-red-200 text-red-700 py-3 rounded-lg font-semibold hover:bg-red-100 flex items-center justify-center transition-colors">
                    <lucide-icon [img]="X" class="h-4 w-4 mr-2"></lucide-icon>
                    Cancel
                </button>
                <button (click)="save()"
                    class="flex-1 bg-emerald-600 text-white py-3 rounded-lg font-semibold hover:bg-emerald-700 flex items-center justify-center transition-colors shadow-lg shadow-emerald-600/20 disabled:opacity-50"
                    [disabled]="isLoading">
                    <lucide-icon [img]="Save" class="h-4 w-4 mr-2" *ngIf="!isLoading"></lucide-icon>
                    <span *ngIf="!isLoading">Save Changes</span>
                    <span *ngIf="isLoading">Saving...</span>
                </button>
            </div>
        </div>
    </div>
</div>
