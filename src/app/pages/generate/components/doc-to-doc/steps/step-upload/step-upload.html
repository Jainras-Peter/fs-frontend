<div class="flex flex-col gap-2 md:min-w-80 lg:min-w-4xl py-4">
    <p-toast position="top-center"></p-toast>
    <div class="text-left">
      <h1 class="text-2xl font-bold text-slate-900">Setup & Upload</h1>
        <p class="mt-1 text-slate-500 text-base">Select document types and upload your source file.</p>
    </div>

    <div class="grid grid-cols-3 gap-4 mt-4">
        <div class="space-y-1">
          <app-input-dropdown [label]="'From'"
                              (selectedValueChange)="mblType = $event"
                              [placeholder]="'Select Input Document'"
                              [items]="inputDocs">
          </app-input-dropdown>
        </div>
        <div class="space-y-1">
            <app-input-dropdown [label]="'To'"
                                (selectedValueChange)="hblType = $event"
                                [placeholder]="'Select Output Document'"
                                [items]="outputDocs">
            </app-input-dropdown>
        </div>
        <div class="space-y-1">
          <app-input-dropdown [label]="'Model'"
                              (selectedValueChange)="model = $event"
                              [placeholder]="'Select AI Model'"
                              [items]="aiModels">
          </app-input-dropdown>
        </div>
    </div>

    <!-- Upload Area -->
    <div class="bg-[url('/file_upload_bg.png')] bg-center bg-cover bg-no-repeat border-2 border-dashed border-blue-700
    rounded-2xl overflow-hidden h-75 w-full flex flex-col
    items-center justify-center relative group
    cursor-pointer select-none"
        (click)="fileInput.click()">
        <div *ngIf="uploadedImage; else emptyState" class="relative w-full h-full flex flex-col
         justify-center items-center p-6">
          <div class="w-16 h-16 bg-slate-50/25 backdrop-blur-[3px] rounded-full flex items-center
          justify-center mx-auto mb-4 border border-solid border-slate-400">
            <lucide-icon [img]="FileUploaded" class="size-8 text-slate-900"></lucide-icon>
          </div>
            <p class="text-emerald-600 font-bold flex items-center mt-2">
                <lucide-icon [img]="Check" class="size-4 mr-2"></lucide-icon> File Uploaded
            </p>
            <p class="text-slate-500 text-xs mt-1">{{ fileName }}</p>
            <button class="mt-2 text-sm text-slate-500 hover:text-slate-900 font-medium">Change File</button>
        </div>

        <ng-template #emptyState>
            <div class="text-center p-8">
                <div
                    class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                    <lucide-icon [img]="Upload" class="h-8 w-8 text-slate-400"></lucide-icon>
                </div>
                <p class="text-slate-600 font-bold">Drop MBL scan here</p>
                <p class="text-slate-600 text-xs mt-1">Supports PDF, PNG, JPG (Max 10MB)</p>
            </div>
        </ng-template>

        <input #fileInput type="file" class="hidden" accept="image/*,application/pdf"
            (change)="onFileSelected($event)" />
    </div>

    <div class="flex justify-center mt-4">
        <button (click)="startProcess()"
            class="w-full md:w-64 bg-blue-700 text-white rounded-lg py-3 px-4 font-semibold hover:bg-blue-800 transition-colors flex items-center justify-center shadow-lg shadow-blue-700/20">
            Start Process <lucide-icon [img]="ArrowRight" class="h-5 w-5 ml-2"></lucide-icon>
        </button>
    </div>
</div>
