<div class="space-y-8 max-w-2xl mx-auto">
    <div class="text-center">
        <h1 class="text-2xl font-bold text-slate-900">Step 1: Setup & Upload</h1>
        <p class="mt-1 text-slate-500 text-sm">Select document types and upload your source file.</p>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1">
            <label class="text-xs font-semibold text-slate-500 uppercase">From</label>
            <div class="relative">
                <select [(ngModel)]="mblType"
                    class="w-full bg-white border border-slate-300 rounded-lg py-2.5 pl-3 pr-10 text-sm text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none appearance-none">
                    <option value="Master BL">Master BL</option>
                    <option value="Ocean BL">Ocean BL</option>
                </select>
                <lucide-icon [img]="ChevronDown"
                    class="absolute right-3 top-3 h-4 w-4 text-slate-400 pointer-events-none"></lucide-icon>
            </div>
        </div>
        <div class="space-y-1">
            <label class="text-xs font-semibold text-slate-500 uppercase">To</label>
            <div class="relative">
                <select [(ngModel)]="hblType"
                    class="w-full bg-white border border-slate-300 rounded-lg py-2.5 pl-3 pr-10 text-sm text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none appearance-none">
                    <option value="House BL">House BL</option>
                    <option value="Forwarder BL">Forwarder BL</option>
                </select>
                <lucide-icon [img]="ChevronDown"
                    class="absolute right-3 top-3 h-4 w-4 text-slate-400 pointer-events-none"></lucide-icon>
            </div>
        </div>
    </div>

    <!-- Upload Area -->
    <div class="bg-white border-2 border-dashed border-slate-200 rounded-2xl overflow-hidden min-h-[300px] flex flex-col items-center justify-center relative group hover:border-blue-300 transition-colors cursor-pointer"
        (click)="fileInput.click()">
        <div *ngIf="uploadedImage; else emptyState" class="relative w-full h-full flex flex-col items-center p-6">
            <img [src]="uploadedImage" alt="MBL Preview" class="max-h-[200px] object-contain mb-4 rounded shadow-sm" />
            <p class="text-emerald-600 text-sm font-semibold flex items-center mt-2">
                <lucide-icon [img]="Check" class="h-4 w-4 mr-2"></lucide-icon> File Uploaded
            </p>
            <p class="text-slate-500 text-xs mt-1">{{ fileName }}</p>
            <button class="mt-2 text-sm text-slate-500 hover:text-slate-900 font-medium">Change File</button>
        </div>

        <ng-template #emptyState>
            <div class="text-center p-8">
                <div
                    class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                    <lucide-icon [img]="Upload" class="h-8 w-8 text-slate-400"></lucide-icon>
                </div>
                <p class="text-slate-600 font-bold">Drop MBL scan here</p>
                <p class="text-slate-400 text-xs mt-1">Supports PNG, JPG (Max 10MB)</p>
            </div>
        </ng-template>

        <input #fileInput type="file" class="hidden" accept="image/*" (change)="onFileSelected($event)" />
    </div>

    <div class="flex justify-center">
        <button (click)="startProcess()"
            class="w-full md:w-64 bg-blue-700 text-white rounded-lg py-3 px-4 font-semibold hover:bg-blue-800 transition-colors flex items-center justify-center shadow-lg shadow-blue-700/20">
            Start Process <lucide-icon [img]="ArrowRight" class="h-5 w-5 ml-2"></lucide-icon>
        </button>
    </div>
</div>
