<div class="w-full text-sm text-slate-800 leading-tight bg-white border border-slate-300 shadow-sm p-4 mt-6">
  <!-- Title -->
  <div class="text-center mb-6">
    <h1 class="text-2xl font-bold tracking-widest text-black">BILL OF EXCHANGE</h1>
  </div>

  <div class="border border-slate-300">
    <!-- Row 1 -->
    <div class="grid grid-cols-2 border-b border-slate-300">
      <div class="p-3 border-r border-slate-300 flex flex-col">
        <label class="text-xs font-semibold text-blue-800 mb-1">Reference No.</label>
        <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
               [ngModel]="data['reference_no']" (ngModelChange)="updateField('reference_no', $event)" placeholder="BOE-00001"/>
      </div>
      <div class="p-3 flex flex-col">
        <label class="text-xs font-semibold text-blue-800 mb-1">Amount in figures</label>
        <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all text-right"
               [ngModel]="data['amount_in_figures']" (ngModelChange)="updateField('amount_in_figures', $event)" placeholder="0.00"/>
      </div>
    </div>

    <!-- Row 2 -->
    <div class="grid grid-cols-2 border-b border-slate-300">
      <div class="p-3 border-r border-slate-300 flex flex-col">
        <label class="text-xs font-semibold text-blue-800 mb-1">B/L Date (if applicable)</label>
        <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
               [ngModel]="data['bl_date']" (ngModelChange)="updateField('bl_date', $event)"/>
      </div>
      <div class="grid grid-cols-2">
         <div class="p-3 border-r border-slate-300 flex flex-col">
           <label class="text-xs font-semibold text-blue-800 mb-1">Place of issue</label>
           <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                  [ngModel]="data['place_of_issue']" (ngModelChange)="updateField('place_of_issue', $event)"/>
         </div>
         <div class="p-3 flex flex-col">
           <label class="text-xs font-semibold text-blue-800 mb-1">Date of issue</label>
           <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                  [ngModel]="data['date_of_issue']" (ngModelChange)="updateField('date_of_issue', $event)" placeholder="22 Apr 2026"/>
         </div>
      </div>
    </div>

    <!-- Row 3: At -->
    <div class="p-3 border-b border-slate-300 flex flex-col">
      <label class="text-xs font-semibold text-blue-800 mb-1">At</label>
      <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
             [ngModel]="data['at']" (ngModelChange)="updateField('at', $event)"/>
    </div>

    <!-- Row 4: Pay to the order of -->
    <div class="p-3 border-b border-slate-300 flex flex-col">
      <label class="text-xs font-semibold text-blue-800 mb-1">Pay to the order of</label>
      <textarea class="w-full h-16 p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none resize-none transition-all"
                [ngModel]="data['pay_to_the_order_of']" (ngModelChange)="updateField('pay_to_the_order_of', $event)" placeholder="Find or add a contact..."></textarea>
    </div>

    <!-- Row 5: The sum of -->
    <div class="p-3 border-b border-slate-300 flex flex-col">
      <label class="text-xs font-semibold text-blue-800 mb-1">The sum of (amount in words)</label>
      <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
             [ngModel]="data['amount_in_words']" (ngModelChange)="updateField('amount_in_words', $event)"/>
    </div>

    <!-- Row 6: Drawn under & Dated -->
    <div class="grid grid-cols-2 border-b border-slate-300">
      <div class="p-3 border-r border-slate-300 flex flex-col">
        <label class="text-xs font-semibold text-blue-800 mb-1">Drawn under</label>
        <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
               [ngModel]="data['drawn_under']" (ngModelChange)="updateField('drawn_under', $event)"/>
      </div>
      <div class="p-3 flex flex-col">
        <label class="text-xs font-semibold text-blue-800 mb-1">Dated</label>
        <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
               [ngModel]="data['dated']" (ngModelChange)="updateField('dated', $event)"/>
      </div>
    </div>

    <!-- Row 7: Issued by -->
    <div class="p-3 border-b border-slate-300 flex flex-col">
      <label class="text-xs font-semibold text-blue-800 mb-1">Issued by</label>
      <textarea class="w-full h-16 p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none resize-none transition-all"
                [ngModel]="data['issued_by']" (ngModelChange)="updateField('issued_by', $event)" placeholder="Find or add a contact..."></textarea>
    </div>

    <!-- Row 8: Signatures Box -->
    <div class="grid grid-cols-2">
      <!-- Drawee Box -->
      <div class="p-3 border-r border-slate-300 flex flex-col justify-between">
         <div class="mb-6 flex flex-col">
            <label class="text-xs font-semibold text-blue-800 mb-1">Signed for and on behalf of Drawee</label>
            <textarea class="w-full h-16 p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none resize-none transition-all"
                      [ngModel]="data['drawee']" (ngModelChange)="updateField('drawee', $event)" placeholder="Find or add a contact..."></textarea>
         </div>
         <div class="flex flex-col">
            <label class="text-xs font-semibold text-blue-800 mb-1">Name of authorized signatory</label>
            <div class="flex gap-2 mb-4">
               <input type="text" class="w-1/2 p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                      [ngModel]="data['drawee_first_name']" (ngModelChange)="updateField('drawee_first_name', $event)" placeholder="First"/>
               <input type="text" class="w-1/2 p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                      [ngModel]="data['drawee_last_name']" (ngModelChange)="updateField('drawee_last_name', $event)" placeholder="Last"/>
            </div>
            <label class="text-xs font-semibold text-blue-800 mb-1">Signature</label>
            <div class="bg-blue-50/50 flex items-center justify-center m-auto rounded-lg w-full py-6">
              <span class="italic text-blue-600">Click here to sign</span>
            </div>
         </div>
      </div>
      
      <!-- Drawer Box -->
      <div class="p-3 flex flex-col justify-between">
         <div class="mb-6 flex flex-col">
            <label class="text-xs font-semibold text-blue-800 mb-1">Signed for and on behalf of Drawer</label>
            <textarea class="w-full h-16 p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none resize-none transition-all"
                      [ngModel]="data['drawer']" (ngModelChange)="updateField('drawer', $event)" placeholder="Find or add a contact..."></textarea>
         </div>
         <div class="flex flex-col">
            <label class="text-xs font-semibold text-blue-800 mb-1">Name of authorized signatory</label>
            <div class="flex gap-2 mb-4">
               <input type="text" class="w-1/2 p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                      [ngModel]="data['drawer_first_name']" (ngModelChange)="updateField('drawer_first_name', $event)" placeholder="First"/>
               <input type="text" class="w-1/2 p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                      [ngModel]="data['drawer_last_name']" (ngModelChange)="updateField('drawer_last_name', $event)" placeholder="Last"/>
            </div>
            <label class="text-xs font-semibold text-blue-800 mb-1">Signature</label>
            <div class="bg-blue-50/50 flex items-center justify-center m-auto rounded-lg w-full py-6">
              <span class="italic text-blue-600">Click here to sign</span>
            </div>
         </div>
      </div>
    </div>
  </div>
</div>
