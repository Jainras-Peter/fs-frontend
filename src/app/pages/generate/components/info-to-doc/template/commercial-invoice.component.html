<div class="w-full text-sm text-slate-800 leading-tight bg-white border border-slate-300 shadow-sm p-4 mt-6">
  <!-- Title -->
  <div class="text-center mb-6">
    <h1 class="text-2xl font-bold tracking-widest text-black">COMMERCIAL INVOICE</h1>
  </div>

  <div class="grid grid-cols-2 border border-slate-300">
    <!-- Left Column: Exporter & Consignee -->
    <div class="col-span-1 border-r border-slate-300 flex flex-col">
      <div class="p-3 border-b border-slate-300 flex flex-col">
        <label class="text-xs font-semibold text-blue-800 mb-1">Exporter</label>
        <textarea class="w-full h-24 p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 focus:ring-blue-100 outline-none resize-none transition-all"
                  [ngModel]="data['exporter']" (ngModelChange)="updateField('exporter', $event)" placeholder="Find or add a contact..."></textarea>
      </div>
      <div class="p-3 flex flex-col">
        <label class="text-xs font-semibold text-blue-800 mb-1">Consignee</label>
        <textarea class="w-full h-24 p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 focus:ring-blue-100 outline-none resize-none transition-all"
                  [ngModel]="data['consignee']" (ngModelChange)="updateField('consignee', $event)" placeholder="Find or add a contact..."></textarea>
      </div>
    </div>

    <!-- Right Column -->
    <div class="col-span-1 flex flex-col">
      <div class="p-3 text-right border-b border-slate-300 flex items-center justify-between">
        <label class="text-xs font-semibold text-blue-800">Pages</label>
        <div class="font-bold">1 of 1</div>
      </div>

      <div class="grid grid-cols-2 border-b border-slate-300">
        <div class="p-3 border-r border-slate-300 flex flex-col">
          <label class="text-xs font-semibold text-blue-800 mb-1">Invoice Number & Date</label>
          <div class="flex gap-2">
             <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                    [ngModel]="data['invoice_number']" (ngModelChange)="updateField('invoice_number', $event)" placeholder="INV-00001"/>
             <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                    [ngModel]="data['invoice_date']" (ngModelChange)="updateField('invoice_date', $event)" placeholder="21 Apr 2026"/>
          </div>
        </div>
        <div class="p-3 flex flex-col">
          <label class="text-xs font-semibold text-blue-800 mb-1">Bill of Lading Number</label>
          <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                 [ngModel]="data['bill_of_lading_number']" (ngModelChange)="updateField('bill_of_lading_number', $event)"/>
        </div>
      </div>

      <div class="grid grid-cols-2 border-b border-slate-300">
        <div class="p-3 border-r border-slate-300 flex flex-col">
          <label class="text-xs font-semibold text-blue-800 mb-1">Reference</label>
          <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                 [ngModel]="data['reference']" (ngModelChange)="updateField('reference', $event)"/>
        </div>
        <div class="p-3 flex flex-col">
          <label class="text-xs font-semibold text-blue-800 mb-1">Buyer Reference</label>
          <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                 [ngModel]="data['buyer_reference']" (ngModelChange)="updateField('buyer_reference', $event)"/>
        </div>
      </div>

      <div class="p-3 flex-grow flex flex-col min-h-[140px]">
        <label class="text-xs font-semibold text-blue-800 mb-1">Buyer (If not Consignee)</label>
        <textarea class="w-full flex-grow p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none resize-none transition-all"
                  [ngModel]="data['buyer']" (ngModelChange)="updateField('buyer', $event)" placeholder="Find or add a contact..."></textarea>
      </div>
    </div>
  </div>

  <!-- Routing Information -->
  <div class="grid grid-cols-4 border border-x-slate-300 border-b-slate-300 border-t-0">
      <div class="p-3 border-r border-b border-slate-300 flex flex-col">
         <label class="text-xs font-semibold text-blue-800 mb-1">Method of Dispatch</label>
         <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                [ngModel]="data['method_of_dispatch']" (ngModelChange)="updateField('method_of_dispatch', $event)"/>
      </div>
      <div class="p-3 border-r border-b border-slate-300 flex flex-col">
         <label class="text-xs font-semibold text-blue-800 mb-1">Type of Shipment</label>
         <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                [ngModel]="data['type_of_shipment']" (ngModelChange)="updateField('type_of_shipment', $event)"/>
      </div>
      <div class="p-3 border-r border-b border-slate-300 flex flex-col">
         <label class="text-xs font-semibold text-blue-800 mb-1">Country of Origin of Goods</label>
         <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                [ngModel]="data['country_of_origin']" (ngModelChange)="updateField('country_of_origin', $event)"/>
      </div>
      <div class="p-3 border-b border-slate-300 flex flex-col">
         <label class="text-xs font-semibold text-blue-800 mb-1">Country of Final Destination</label>
         <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                [ngModel]="data['country_of_final_destination']" (ngModelChange)="updateField('country_of_final_destination', $event)"/>
      </div>

      <div class="col-span-2 grid grid-cols-2">
         <div class="p-3 border-r border-b border-slate-300 flex flex-col">
            <label class="text-xs font-semibold text-blue-800 mb-1">Vessel / Aircraft</label>
            <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                   [ngModel]="data['vessel_aircraft']" (ngModelChange)="updateField('vessel_aircraft', $event)"/>
         </div>
         <div class="p-3 border-r border-b border-slate-300 flex flex-col">
            <label class="text-xs font-semibold text-blue-800 mb-1">Voyage No</label>
            <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                   [ngModel]="data['voyage_no']" (ngModelChange)="updateField('voyage_no', $event)"/>
         </div>
         <div class="p-3 border-r border-b border-slate-300 flex flex-col">
            <label class="text-xs font-semibold text-blue-800 mb-1">Port of Loading</label>
            <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                   [ngModel]="data['port_of_loading']" (ngModelChange)="updateField('port_of_loading', $event)"/>
         </div>
         <div class="p-3 border-r border-b border-slate-300 flex flex-col">
            <label class="text-xs font-semibold text-blue-800 mb-1">Date of Departure</label>
            <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                   [ngModel]="data['date_of_departure']" (ngModelChange)="updateField('date_of_departure', $event)"/>
         </div>
      </div>
      <div class="col-span-2 p-3 border-b border-slate-300 flex flex-col">
          <label class="text-xs font-semibold text-blue-800 mb-1">Terms / Method of Payment</label>
          <textarea class="w-full flex-grow p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none resize-none transition-all min-h-[100px]"
                    [ngModel]="data['terms_method_of_payment']" (ngModelChange)="updateField('terms_method_of_payment', $event)"></textarea>
      </div>

      <div class="p-3 border-r border-slate-300 flex flex-col">
         <label class="text-xs font-semibold text-blue-800 mb-1">Port of Discharge</label>
         <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                [ngModel]="data['port_of_discharge']" (ngModelChange)="updateField('port_of_discharge', $event)"/>
      </div>
      <div class="p-3 border-r border-slate-300 flex flex-col">
         <label class="text-xs font-semibold text-blue-800 mb-1">Final Destination</label>
         <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                [ngModel]="data['final_destination']" (ngModelChange)="updateField('final_destination', $event)"/>
      </div>
      <div class="p-3 border-r border-slate-300 flex flex-col">
         <label class="text-xs font-semibold text-blue-800 mb-1">Marine Cover Policy No</label>
         <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                [ngModel]="data['marine_cover_policy_no']" (ngModelChange)="updateField('marine_cover_policy_no', $event)"/>
      </div>
      <div class="p-3 flex flex-col">
         <label class="text-xs font-semibold text-blue-800 mb-1">Letter Of Credit No</label>
         <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                [ngModel]="data['letter_of_credit_no']" (ngModelChange)="updateField('letter_of_credit_no', $event)"/>
      </div>
  </div>

  <!-- Goods Table -->
  <div class="border border-slate-300 border-t-0 p-3 bg-slate-50 min-h-[150px] flex flex-col">
     <label class="text-xs font-semibold text-blue-800 mb-2">Product Code | Description of Goods | HS Code | Unit Quantity | Unit Type | Price | Amount</label>
     <div class="grid grid-cols-12 gap-2 flex-grow">
        <div class="col-span-2">
           <textarea class="w-full h-full p-2 text-sm bg-white border border-slate-200 outline-none resize-none transition-all"
                  [ngModel]="data['product_code']" (ngModelChange)="updateField('product_code', $event)" placeholder="Product..."></textarea>
        </div>
        <div class="col-span-4">
           <textarea class="w-full h-full p-2 text-sm bg-white border border-slate-200 outline-none resize-none transition-all"
                  [ngModel]="data['description_of_goods']" (ngModelChange)="updateField('description_of_goods', $event)" placeholder="Description..."></textarea>
        </div>
        <div class="col-span-2">
           <textarea class="w-full h-full p-2 text-sm bg-white border border-slate-200 outline-none resize-none transition-all"
                  [ngModel]="data['hs_code']" (ngModelChange)="updateField('hs_code', $event)" placeholder="HS..."></textarea>
        </div>
        <div class="col-span-1 flex flex-col gap-2">
           <input type="text" class="w-full p-2 text-sm bg-white border border-slate-200 outline-none transition-all" placeholder="Qty" [ngModel]="data['unit_quantity']" (ngModelChange)="updateField('unit_quantity', $event)" />
           <input type="text" class="w-full p-2 text-sm bg-white border border-slate-200 outline-none transition-all" placeholder="Type" [ngModel]="data['unit_type']" (ngModelChange)="updateField('unit_type', $event)" />
        </div>
        <div class="col-span-3 flex flex-col gap-2">
           <input type="text" class="w-full p-2 text-sm bg-white border border-slate-200 outline-none transition-all" placeholder="Price" [ngModel]="data['price']" (ngModelChange)="updateField('price', $event)" />
           <input type="text" class="w-full p-2 text-sm bg-white border border-slate-200 outline-none transition-all" placeholder="Amount" [ngModel]="data['amount']" (ngModelChange)="updateField('amount', $event)" />
        </div>
     </div>
  </div>

  <div class="border border-slate-300 border-t-0 p-3 bg-slate-50 flex items-center gap-4 justify-end font-semibold text-blue-800">
    <label class="text-xs">Consignment Total (Qty & Amount)</label>
    <input type="text" class="w-24 p-2 text-sm bg-white border border-slate-200 outline-none transition-all"
           [ngModel]="data['total_unit_quantity']" (ngModelChange)="updateField('total_unit_quantity', $event)" placeholder="0"/>
    <input type="text" class="w-24 p-2 text-sm bg-white border border-slate-200 outline-none transition-all"
           [ngModel]="data['total_amount']" (ngModelChange)="updateField('total_amount', $event)" placeholder="0.00"/>
  </div>

  <div class="grid grid-cols-12 border border-slate-300 border-t-0">
     <div class="col-span-7 flex flex-col border-r border-slate-300">
        <div class="p-3 border-b border-slate-300 flex-grow flex flex-col min-h-[150px]">
           <label class="text-xs font-semibold text-blue-800 mb-1">Additional Info</label>
           <textarea class="w-full p-2 flex-grow text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none resize-none transition-all"
                     [ngModel]="data['additional_info']" (ngModelChange)="updateField('additional_info', $event)"></textarea>
        </div>
        <div class="p-3 flex flex-col min-h-[150px]">
           <label class="text-xs font-semibold text-blue-800 mb-1">Bank Details</label>
           <textarea class="w-full p-2 flex-grow text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none resize-none transition-all"
                     [ngModel]="data['bank_details']" (ngModelChange)="updateField('bank_details', $event)"></textarea>
        </div>
     </div>

     <div class="col-span-5 flex flex-col">
        <div class="grid grid-cols-3 border-b border-slate-300 p-3 items-center">
            <label class="col-span-2 text-xs font-semibold text-blue-800">Add charge or discount</label>
            <input type="text" class="col-span-1 w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all text-right"
                   [ngModel]="data['charge_or_discount']" (ngModelChange)="updateField('charge_or_discount', $event)" />
        </div>
        <div class="grid grid-cols-3 border-b border-slate-300 p-3 items-center">
            <label class="col-span-2 text-xs font-semibold text-blue-800">Add tax</label>
            <input type="text" class="col-span-1 w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all text-right"
                   [ngModel]="data['tax']" (ngModelChange)="updateField('tax', $event)" />
        </div>
        <div class="grid grid-cols-3 border-b border-slate-300 p-3 items-center bg-slate-50 font-bold">
            <label class="col-span-2 text-xs text-slate-800">TOTAL:</label>
            <input type="text" class="col-span-1 w-full p-2 text-sm bg-white border border-slate-200 outline-none transition-all text-right"
                   [ngModel]="data['final_total']" (ngModelChange)="updateField('final_total', $event)" />
        </div>

        <div class="grid grid-cols-3 border-b border-slate-300">
           <div class="col-span-2 p-3 border-r border-slate-300 flex flex-col">
              <label class="text-xs font-semibold text-blue-800 mb-1">Incoterms® 2020</label>
              <div class="flex gap-2">
                 <input type="text" class="w-1/3 p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                        [ngModel]="data['incoterms_term']" (ngModelChange)="updateField('incoterms_term', $event)" placeholder="Term"/>
                 <input type="text" class="w-2/3 p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                        [ngModel]="data['incoterms_place']" (ngModelChange)="updateField('incoterms_place', $event)" placeholder="Place"/>
              </div>
           </div>
           <div class="col-span-1 p-3 flex flex-col">
              <label class="text-xs font-semibold text-blue-800 mb-1">Currency</label>
              <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                     [ngModel]="data['currency']" (ngModelChange)="updateField('currency', $event)"/>
           </div>
        </div>

        <div class="p-3 border-b border-slate-300 flex flex-col">
           <label class="text-xs font-semibold text-blue-800 mb-1">Signatory Company</label>
           <input type="text" class="w-full p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                  [ngModel]="data['signatory_company']" (ngModelChange)="updateField('signatory_company', $event)"/>
        </div>

        <div class="p-3 border-b border-slate-300 flex flex-col">
           <label class="text-xs font-semibold text-blue-800 mb-1">Name of Authorized Signatory</label>
           <div class="flex gap-2">
              <input type="text" class="w-1/2 p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                     [ngModel]="data['signatory_last_name']" (ngModelChange)="updateField('signatory_last_name', $event)" placeholder="Last name"/>
              <input type="text" class="w-1/2 p-2 text-sm bg-slate-50 border border-transparent focus:bg-white focus:border-blue-300 focus:ring-1 outline-none transition-all"
                     [ngModel]="data['signatory_first_name']" (ngModelChange)="updateField('signatory_first_name', $event)" placeholder="First name"/>
           </div>
        </div>
    </div>
  </div>

</div>
