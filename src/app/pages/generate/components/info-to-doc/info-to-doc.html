<div class="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-slate-900">Manual Data Entry</h1>
            <p class="mt-1 text-slate-500 text-sm">Fill in key value pairs to generate a structured HBL.</p>
        </div>
        <button (click)="handleTemplateLoad()"
            class="bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 font-medium py-2 px-4 rounded-lg flex items-center shadow-sm transition-colors">
            <lucide-icon [img]="LayoutTemplate" class="h-4 w-4 mr-2"></lucide-icon>
            Choose Template
        </button>
    </div>

    <div class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
        <div class="px-6 py-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
            <h3 class="font-semibold text-slate-700">Document Particulars</h3>
            <span class="text-xs text-slate-500">All fields required</span>
        </div>
        <div class="divide-y divide-slate-100">
            <!-- Fields -->
            <ng-container *ngFor="let field of [
          { label: 'Shipper', key: 'shipper', type: 'textarea', rows: 3 },
          { label: 'Consignee', key: 'consignee', type: 'textarea', rows: 3 },
          { label: 'Notify Party', key: 'notifyParty', type: 'textarea', rows: 3 },
          { label: 'Vessel / Voyage', key: 'vessel', type: 'input' },
          { label: 'Port of Loading', key: 'pol', type: 'input' },
          { label: 'Port of Discharge', key: 'pod', type: 'input' },
          { label: 'Description of Goods', key: 'goodsDesc', type: 'textarea', rows: 4 },
          { label: 'Weight / Measure', key: 'weight', type: 'input' }
        ]">
                <div class="grid grid-cols-1 md:grid-cols-4 group">
                    <div
                        class="p-4 bg-slate-50/50 text-sm font-medium text-slate-600 border-r border-slate-100 md:text-right md:pr-6 flex items-center md:justify-end">
                        {{ field.label }}
                    </div>
                    <div class="col-span-3 p-2">
                        <textarea *ngIf="field.type === 'textarea'" [rows]="$any(field).rows"
                            class="w-full p-2 text-sm text-slate-900 bg-transparent rounded border border-transparent focus:bg-white focus:border-blue-300 focus:ring-2 focus:ring-blue-100 outline-none transition-all resize-y"
                            [placeholder]="'Enter ' + field.label + '...'" [ngModel]="$any(infoForm)[field.key]"
                            (ngModelChange)="handleInfoChange(field.key, $event)"></textarea>
                        <input *ngIf="field.type === 'input'" type="text"
                            class="w-full p-2 text-sm text-slate-900 bg-transparent rounded border border-transparent focus:bg-white focus:border-blue-300 focus:ring-2 focus:ring-blue-100 outline-none transition-all"
                            [placeholder]="'Enter ' + field.label + '...'" [ngModel]="$any(infoForm)[field.key]"
                            (ngModelChange)="handleInfoChange(field.key, $event)" />
                    </div>
                </div>
            </ng-container>
        </div>
        <div class="p-4 bg-slate-50 border-t border-slate-200 flex justify-end">
            <button (click)="handleInfoGenerate()"
                class="w-full md:w-auto bg-blue-700 text-white rounded-lg py-2 px-6 font-semibold hover:bg-blue-800 transition-colors flex items-center justify-center">
                Generate Preview <lucide-icon [img]="ArrowRight" class="h-4 w-4 ml-2"></lucide-icon>
            </button>
        </div>
    </div>

    <div id="preview-section" *ngIf="showInfoPreview"
        class="pt-8 animate-in fade-in slide-in-from-bottom-8 duration-700">
        <div class="flex items-center space-x-4 mb-6">
            <div class="h-px bg-slate-200 flex-1"></div>
            <span class="text-slate-400 text-xs font-semibold uppercase tracking-wider">Document Preview</span>
            <div class="h-px bg-slate-200 flex-1"></div>
        </div>

        <div class="grid lg:grid-cols-12 gap-8">
            <div class="lg:col-span-8 lg:col-start-3">
                <app-document-preview [data]="infoForm" [isLoading]="false">
                </app-document-preview>

                <div class="flex space-x-4 mt-6">
                    <button (click)="showInfoPreview = false"
                        class="flex-1 bg-white border border-slate-300 text-slate-700 py-3 rounded-lg font-semibold hover:bg-slate-50 flex items-center justify-center transition-colors">
                        <lucide-icon [img]="Edit3" class="h-4 w-4 mr-2"></lucide-icon>
                        Edit Data
                    </button>
                    <button (click)="handleInfoConfirm()"
                        class="flex-1 bg-blue-700 text-white py-3 rounded-lg font-semibold hover:bg-blue-800 flex items-center justify-center transition-colors shadow-lg shadow-blue-700/20 disabled:opacity-50"
                        [disabled]="isInfoGenerating">
                        <lucide-icon [img]="Check" class="h-4 w-4 mr-2"></lucide-icon>
                        <span *ngIf="!isInfoGenerating">Confirm & Generate</span>
                        <span *ngIf="isInfoGenerating">Generating...</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
