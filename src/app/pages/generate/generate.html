<div class="h-[calc(100vh-4rem)] w-full bg-[#E2E8F0] overflow-hidden">
    <div class="h-full flex flex-col md:flex-row">

        <!-- Left Navigation Sidebar -->
        <aside class="h-full z-50 shrink-0">
            <app-generate-sidebar [activeMode]="activeMode" (modeChange)="onModeChange($event)">
            </app-generate-sidebar>
        </aside>

        <!-- Main Content Area -->
        <div class="relative flex-1 min-w-0 h-full overflow-y-auto bg-[url('/background.png')] bg-center bg-cover bg-no-repeat">
            <!-- Loading Overlay -->
            <div *ngIf="isLoading"
                 class="absolute top-[40%] left-[40%] flex flex-col items-center justify-center">
              <lucide-icon [img]="Loader2" class="h-12 w-12 text-blue-600 animate-spin mb-4"></lucide-icon>
              <p class="text-slate-600 font-medium animate-pulse">Processing document...</p>
            </div>
            <!-- Mode: Document to Document -->
            <app-doc-to-doc
              *ngIf="activeMode === 'doc-to-doc'"
              (loadingChange)="isLoading = $event">
            </app-doc-to-doc>

            <!-- Mode: Info to Document -->
            <app-info-to-doc *ngIf="activeMode === 'info-to-doc'"></app-info-to-doc>

        </div>
    </div>
</div>
