<div class="h-full w-full bg-[#E2E8F0]">
    <div class="flex flex-col md:flex-row gap-8">

        <!-- Left Navigation Sidebar -->
        <aside class="h-screen">
            <app-generate-sidebar [activeMode]="activeMode" (modeChange)="onModeChange($event)">
            </app-generate-sidebar>
        </aside>

        <!-- Main Content Area -->
        <div class="flex-1 min-w-0">

            <!-- Mode: Document to Document -->
            <app-doc-to-doc *ngIf="activeMode === 'doc-to-doc'"></app-doc-to-doc>

            <!-- Mode: Info to Document -->
            <app-info-to-doc *ngIf="activeMode === 'info-to-doc'"></app-info-to-doc>

        </div>
    </div>
</div>
