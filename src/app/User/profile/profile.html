<div class="min-h-screen bg-slate-50 p-6">
  <p-toast position="top-right"></p-toast>

  <div class="mx-auto max-w-4xl rounded-lg bg-white p-8 shadow-sm">
    <div class="mb-6 flex flex-col gap-2">
      <h1 class="text-3xl font-semibold text-slate-900">Forwarder Profile</h1>
      <p class="text-sm text-slate-500">Review and update your company details. Logo upload is available locally only.</p>
    </div>

    <div class="grid gap-6 lg:grid-cols-3">
      <div class="space-y-4 rounded-lg border border-slate-200 bg-slate-50 p-4">
        <div class="flex h-32 items-center justify-center rounded border border-dashed border-slate-300 bg-white">
          <ng-container *ngIf="logoPreviewUrl; else defaultLogo">
            <img [src]="logoPreviewUrl" alt="Logo preview" class="h-full object-contain" />
          </ng-container>
          <ng-template #defaultLogo>
            <div class="text-center text-slate-500">
              <div class="text-4xl">🖼️</div>
              <div class="text-sm">Logo preview</div>
            </div>
          </ng-template>
        </div>

        <div>
          <label class="text-sm font-semibold text-slate-700">Upload Logo (local only)</label>
          <input type="file" accept="image/*" (change)="onLogoSelected($event)" class="mt-2 block w-full text-sm text-slate-700" />
          <div *ngIf="selectedLogoName" class="mt-2 text-xs text-slate-500">Selected: {{selectedLogoName}}</div>
        </div>
      </div>

      <div class="lg:col-span-2">
        <form [formGroup]="profileForm" class="space-y-6">
          <div class="grid gap-4 sm:grid-cols-2">
            <div>
              <label class="block text-sm font-medium text-slate-700">Company Name</label>
              <input pInputText formControlName="companyName" class="mt-2 w-full rounded border border-slate-300 px-3 py-2" />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700">Username</label>
              <input pInputText formControlName="username" class="mt-2 w-full rounded border border-slate-300 bg-slate-100 px-3 py-2 text-slate-500" />
            </div>
          </div>

          <div class="grid gap-4 sm:grid-cols-2">
            <div>
              <label class="block text-sm font-medium text-slate-700">Email</label>
              <input pInputText formControlName="email" type="email" class="mt-2 w-full rounded border border-slate-300 px-3 py-2" />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700">Phone</label>
              <input pInputText formControlName="phone" type="tel" class="mt-2 w-full rounded border border-slate-300 px-3 py-2" />
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700">Address</label>
            <textarea pInputTextarea formControlName="address" rows="4" class="mt-2 w-full rounded border border-slate-300 px-3 py-2"></textarea>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700">Default Language</label>
            <input pInputText formControlName="defaultLanguage" placeholder="e.g. English" class="mt-2 w-full rounded border border-slate-300 px-3 py-2" />
          </div>

          <div class="flex justify-end">
            <button pButton label="Save Profile" class="p-button-success" type="button" (click)="saveProfile()" [disabled]="profileForm.invalid || isLoading"></button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
