<div class="min-h-screen bg-[url('/loginbg.png')] bg-cover bg-center flex items-center justify-center p-4">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-8 relative overflow-hidden">
    <p-toast position="top-right"></p-toast>
    <!-- Top right decoration -->
    <div class="absolute top-0 right-0 w-32 h-32 bg-gray-100 rounded-bl-[100px] -z-10"></div>
    <div class="absolute top-0 right-0 w-32 h-32 bg-gray-50 rounded-bl-[80px] -z-20 transform translate-x-2 -translate-y-2"></div>

    <div class="mb-8 mt-2 relative z-10 text-center">
      <h2 class="text-3xl font-bold text-gray-900">LOGIN</h2>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6 relative z-10">
      <!-- Username -->
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Username <span class="text-red-600">*</span></label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex flex-col justify-center pointer-events-none">
            <svg class="h-4 w-4 text-gray-400" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
          </div>
          <input type="text" formControlName="username" required
                 class="block w-full pl-10 pr-3 py-3 border-0 bg-[#E2E8F0] bg-opacity-70 rounded focus:ring-2 focus:ring-[#0047AB] text-gray-900 placeholder-gray-400 text-sm font-medium" 
                 placeholder="Enter your identifier">
        </div>
        <p *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.invalid" class="text-xs text-red-600 mt-2">Username is required.</p>
      </div>

      <!-- Password -->
      <div>
        <div class="flex justify-between items-center mb-2">
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest">Password <span class="text-red-600">*</span></label>
          <a href="#" class="text-xs font-bold text-[#006A80] hover:text-[#0047AB]">Reset Credentials</a>
        </div>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex flex-col justify-center pointer-events-none">
            <svg class="h-4 w-4 text-gray-400" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>
          </div>
          <input type="password" formControlName="password" required
                 class="block w-full pl-10 pr-3 py-3 border-0 bg-[#E2E8F0] bg-opacity-70 rounded focus:ring-2 focus:ring-[#0047AB] text-gray-900 placeholder-gray-400 text-sm font-medium" 
                 placeholder="••••••••">
        </div>
        <p *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="text-xs text-red-600 mt-2">Password is required.</p>
      </div>

      <!-- Submit Button -->
      <div class="pt-2">
        <button type="submit"
                class="w-full flex justify-center items-center py-3.5 px-4 border border-transparent rounded shadow-sm text-sm font-bold text-white bg-[#003B95] hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#003B95] transition-colors">
          Login 
          <svg class="ml-2 -mr-1 h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </div>
    </form>

    <div class="mt-8 text-center relative z-10">
      <p class="text-xs font-semibold text-gray-600">
        New to the fleet? <a routerLink="/signup" class="font-bold text-[#006A80] hover:text-[#0047AB]">Sign Up</a>
      </p>
    </div>
  </div>
</div>
